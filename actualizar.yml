name: Actualizar catálogo

on:
  schedule:
    - cron: "0 7 * * 1"   # lunes 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar yt-dlp
        run: pip install yt-dlp

      - name: Actualizar catálogo
        run: python3 actualizar_catalogo.py

      - name: Publicar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json index.html
          if git diff --cached --quiet; then
            echo "Sin cambios en el catálogo."
          else
            git commit -m "Actualización automática del catálogo"
            git push
          fi
